<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #0D0D0E;
            --ink-black: #050505;
            --paper-white: #E8E8E8;
            --signal-orange: #FF6B00;
            --signal-green: #00FF85;
            --grain-opacity: 0.07;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        /* The Inkwell Container */
        .inkwell-banner {
            position: relative;
            width: 100%;
            max-width: 900px;
            background: var(--obsidian);
            border-radius: 32px;
            padding: 40px;
            color: var(--paper-white);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 40px;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Grain Overlay */
        .inkwell-banner::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: var(--grain-opacity);
            mix-blend-mode: overlay;
            z-index: 2;
        }

        /* Branding Section */
        .brand-section {
            position: relative;
            z-index: 3;
        }

        .brand-title {
            font-weight: 900;
            font-size: 10px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-title::before {
            content: "";
            width: 30px;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        .status-display {
            font-size: 42px;
            line-height: 1.1;
            font-weight: 900;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
            color: var(--paper-white);
        }

        /* The Indicator */
        .indicator-group {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            text-transform: uppercase;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: relative;
        }

        .status-waiting .dot {
            background: var(--signal-orange);
            box-shadow: 0 0 15px var(--signal-orange);
            animation: pulse-orange 1.5s infinite ease-in-out;
        }

        .status-ready .dot {
            background: var(--signal-green);
            box-shadow: 0 0 15px var(--signal-green);
            animation: none;
        }

        .status-ready #status-text {
            color: var(--signal-green);
        }

        @keyframes pulse-orange {
            0% { transform: scale(0.9); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.5; }
        }

        /* Stats Grid */
        .stats-grid {
            position: relative;
            z-index: 3;
            background: var(--ink-black);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
        }

        /* Orb Loader */
        .orb-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .orb-wrapper.hidden {
            display: none;
        }

        .orb-scene {
            --color-one: #ffbf48;
            --color-two: #be4a1d;
            --color-three: #e8533a;
            --color-four: #ff8c42;
            --anim-time: 2s;
            width: 120px;
            height: 120px;
            position: relative;
        }

        .orb-scene svg {
            position: absolute;
            width: 0;
            height: 0;
        }

        .orb-scene .box {
            width: 100%;
            height: 100%;
            background: conic-gradient(
                var(--color-one),
                var(--color-two),
                var(--color-three),
                var(--color-four),
                var(--color-one)
            );
            -webkit-mask: url(#clipping);
            mask: url(#clipping);
            animation:
                rotation var(--anim-time) linear infinite,
                roundness calc(var(--anim-time) * 2) ease-in-out infinite alternate,
                colorize calc(var(--anim-time) * 3) ease-in-out infinite alternate;
            border-radius: 30%;
            filter: drop-shadow(0 0 18px rgba(255, 191, 72, 0.55));
        }

        @keyframes rotation {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        @keyframes roundness {
            0%   { border-radius: 30%; }
            50%  { border-radius: 50%; }
            100% { border-radius: 30%; }
        }

        @keyframes colorize {
            0%   { filter: drop-shadow(0 0 18px rgba(255, 191, 72, 0.55)) hue-rotate(0deg); }
            50%  { filter: drop-shadow(0 0 24px rgba(190, 74, 29, 0.65)) hue-rotate(30deg); }
            100% { filter: drop-shadow(0 0 18px rgba(255, 191, 72, 0.55)) hue-rotate(0deg); }
        }

        /* Notification Reveal */
        .notification-tray {
            position: absolute;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: var(--signal-green);
            color: black;
            padding: 12px 40px;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 12px;
            text-align: center;
            transition: bottom 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 4;
        }

        .status-ready .notification-tray {
            bottom: 0;
        }

        /* Progress Bar (Visual Only) */
        .progress-container {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.05);
            margin-top: 30px;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 65%;
            background: var(--paper-white);
            opacity: 0.4;
            transition: width 1s ease, background 0.5s ease;
        }

        .status-ready .progress-bar {
            width: 100%;
            background: var(--signal-green);
            opacity: 1;
        }

        /* Decorative Elements */
        .ink-splat {
            position: absolute;
            right: -50px;
            top: -50px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .inkwell-banner {
                grid-template-columns: 1fr;
                margin: 20px;
                padding: 30px;
            }
        }
    </style>
</head>
<body>

    <div id="inkwell-press-banner" class="inkwell-banner status-waiting">
        <div class="ink-splat"></div>
        
        <div class="brand-section">
            <div class="brand-title">Obsidian Inkwell Press</div>
            <div class="status-display" id="main-status">
                Etching your <br>creative vision.
            </div>
            
            <div class="indicator-group">
                <div class="dot"></div>
                <span id="status-text">Processing Engine Live</span>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progress-indicator"></div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="orb-wrapper" id="orb-wrapper">
                <div class="orb-scene">
                    <svg xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <mask id="clipping">
                                <polygon points="60,5 75,20 95,15 90,35 110,45 90,55 95,75 75,70 60,85 45,70 25,75 30,55 10,45 30,35 25,15 45,20" fill="white"/>
                                <polygon points="60,15 72,27 88,23 84,39 100,47 84,55 88,71 72,67 60,79 48,67 32,71 36,55 20,47 36,39 32,23 48,27" fill="black" opacity="0.3"/>
                                <polygon points="60,22 70,32 84,29 81,43 95,50 81,57 84,71 70,68 60,78 50,68 36,71 39,57 25,50 39,43 36,29 50,32" fill="white" opacity="0.6"/>
                                <polygon points="60,30 68,38 80,35 77,47 89,53 77,59 80,71 68,68 60,76 52,68 40,71 43,59 31,53 43,47 40,35 52,38" fill="black" opacity="0.2"/>
                                <polygon points="60,36 67,43 77,41 75,51 85,56 75,61 77,71 67,69 60,76 53,69 43,71 45,61 35,56 45,51 43,41 53,43" fill="white" opacity="0.5"/>
                                <polygon points="60,42 66,48 74,46 72,55 81,59 72,63 74,72 66,70 60,76 54,70 46,72 48,63 39,59 48,55 46,46 54,48" fill="black" opacity="0.15"/>
                                <polygon points="60,48 65,53 72,51 70,59 78,63 70,67 72,75 65,73 60,78 55,73 48,75 50,67 42,63 50,59 48,51 55,53" fill="white" opacity="0.4"/>
                            </mask>
                        </defs>
                    </svg>
                    <div class="box"></div>
                </div>
            </div>
        </div>

        <div class="notification-tray" id="notif-bar">
            SYSTEM NOTIFICATION: TRANSFER COMPLETE / READY FOR VIEWING
        </div>
    </div>

    <script>
        const banner     = document.getElementById('inkwell-press-banner');
        const mainStatus = document.getElementById('main-status');
        const statusText = document.getElementById('status-text');
        const orbWrapper = document.getElementById('orb-wrapper');

        function completeTask() {
            banner.classList.remove('status-waiting');
            banner.classList.add('status-ready');
            banner.style.transform = 'scale(1.02)';
            setTimeout(() => { banner.style.transform = 'scale(1)'; }, 200);
            setTimeout(() => {
                statusText.innerText = 'Sequence Complete';
                mainStatus.innerHTML = 'Ink Permanence <br>Achieved.';
                orbWrapper.classList.add('hidden');
            }, 300);
        }

        function updateStatus(message) {
            mainStatus.innerText = message;
        }

        // ── WebSocket connection to the MCP server ──────────────────────────
        const WS_URL = `ws://${location.host}`;

        function connect() {
            const ws = new WebSocket(WS_URL);

            ws.onmessage = (event) => {
                let msg;
                try { msg = JSON.parse(event.data); } catch { return; }
                if (msg.type === 'complete') completeTask();
                if (msg.type === 'status')   updateStatus(msg.message);
            };

            ws.onclose = () => setTimeout(connect, 2000);
        }

        connect();
    </script>
</body>
</html>
